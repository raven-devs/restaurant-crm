name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npx prettier --check "src/**/*.ts" "web/src/**/*.{ts,tsx}"

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - run: npx tsc --noEmit

      - run: npm run build

      - run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npx eslint .

      - run: npx tsc -b

      - run: npx vite build
